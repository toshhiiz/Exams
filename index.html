<!DOCTYPE html>
<html lang="ru">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/i18next/23.7.6/i18next.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/i18next-browser-languagedetector/7.2.0/i18nextBrowserLanguageDetector.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java Экзамен - 360 вопросов</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>Экзамен</h1>
                <p id="pageSubtitle">360 вопросов - 9 вариантов по 40 вопросов</p>
            </div>
            <div class="language">
                <label for="languageSelect">Язык:</label>
                <select id="languageSelect" onchange="changeLanguage()">
                    <option value="ru">Русский</option>
                    <option value="en">English</option>
                    <option value="kz">Казахский</option>
                </select>
            </div>
        </div>
    


        <div class="controls">
            <div class="control-group">
                <label for="variant">Выбрать вариант:</label>
                <select id="variant">
                    <option value="1">Вариант 1</option>
                    <option value="2">Вариант 2</option>
                    <option value="3">Вариант 3</option>
                    <option value="4">Вариант 4</option>
                    <option value="5">Вариант 5</option>
                    <option value="6">Вариант 6</option>
                    <option value="7">Вариант 7</option>
                    <option value="8">Вариант 8</option>
                    <option value="9">Вариант 9</option>
                </select>
            </div>

            <div class="control-group">
                <label>&nbsp;</label>
                <button onclick="selectRandomVariant()" style="background: #28a745;">🎲 Случайный вариант</button>
            </div>

            <div class="control-group">
                <label for="questionNumber">Номер вопроса:</label>
                <input type="number" id="questionNumber" min="1" max="40" value="1">
            </div>

            <div class="control-group">
                <label>Режим просмотра:</label>
                <div class="view-options">
                    <button id="viewSingle" class="active" onclick="setViewMode('single')">По одному</button>
                    <button id="viewAll" onclick="setViewMode('all')">Все вопросы</button>
                </div>
            </div>
        </div>

        <div class="content" id="content">
            <div class="message info">Выберите вариант для начала</div>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="totalQuestions">0</div>
                <div class="stat-label">Всего вопросов</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="answered">0</div>
                <div class="stat-label">Ответлено</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="progress">0%</div>
                <div class="stat-label">Прогресс</div>
            </div>
        </div>
    </div>

    <script>
        let questionsData = {};
        let currentLanguage = 'ru';
        let allLanguageData = { ru: {}, en: {}, kz: {} };

        async function loadLanguageData(lang) {
          const fileName = lang === 'ru' ? 'locales/ru.json' :
                          lang === 'en' ? 'locales/eng.json' :
                          'locales/kz.json';
          try {
            const response = await fetch(fileName);
            const data = await response.json();
            allLanguageData[lang] = data;
            return data;
          } catch (e) {
            console.error(`Failed to load ${fileName}:`, e);
            return allLanguageData[lang];
          }
        }

        async function initLanguages() {
          await loadLanguageData('ru');
          await loadLanguageData('en');
          await loadLanguageData('kz');
        }

        i18next.init({
          lng: 'ru',
          resources: {
            ru: { translation: { } },
            en: { translation: { } },
            kz: { translation: { } }
          }
        });

        async function changeLanguage() {
          const lang = document.getElementById('languageSelect').value;
          currentLanguage = lang;
          i18next.changeLanguage(lang);

          if (allLanguageData[lang] && allLanguageData[lang].variants) {
            questionsData = allLanguageData[lang].variants;
            showQuestions();
          }
        }

        let currentVariant = null;
        let hiddenVariant = null;
        let viewMode = 'single';
        let currentPage = 1;
        let showingResults = false;
        let currentSubject = 'java';
        let answers = {};
        let timerInterval = null;
        let timeRemaining = 0;
        let isExamActive = false;

        function loadAnswers() {
            const saved = localStorage.getItem('javaExamAnswers');
            if (saved) {
                answers = JSON.parse(saved);
            }
        }

        function saveAnswers() {
            localStorage.setItem('javaExamAnswers', JSON.stringify(answers));
        }

        function switchSubject(subject) {
            currentSubject = subject;
            if (allLanguageData[currentLanguage] && allLanguageData[currentLanguage].variants) {
              questionsData = allLanguageData[currentLanguage].variants;
            }
            currentVariant = null;
            currentPage = 1;
            showingResults = false;
            hiddenVariant = null;

            document.querySelectorAll('.subject-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');

            document.getElementById('pageSubtitle').textContent = '360 вопросов - 9 вариантов по 40 вопросов';

            document.getElementById('variant').value = '';
            document.getElementById('variant').style.display = 'block';
            document.querySelector('button[onclick="selectRandomVariant()"]').style.display = 'block';
            const randomInfo = document.getElementById('randomVariantInfo');
            if (randomInfo) randomInfo.remove();

            showQuestions();
        }

        document.getElementById('variant').addEventListener('change', function(e) {
            const variant = e.target.value;
            if (variant) {
                hiddenVariant = null;
                currentVariant = parseInt(variant);
                currentPage = 1;
                showingResults = false;
                document.getElementById('questionNumber').value = 1;
                if (!answers[currentVariant]) {
                    answers[currentVariant] = {};
                }

                document.getElementById('variant').style.display = 'block';
                document.querySelector('button[onclick="selectRandomVariant()"]').style.display = 'block';
                const randomInfo = document.getElementById('randomVariantInfo');
                if (randomInfo) randomInfo.remove();

                updateStats();
                showQuestions();
            }
        });

        document.getElementById('questionNumber').addEventListener('change', function(e) {
            currentPage = parseInt(e.target.value);
            showingResults = false;
            showQuestions();
        });

        function setViewMode(mode) {
            viewMode = mode;
            document.getElementById('viewSingle').classList.toggle('active', mode === 'single');
            document.getElementById('viewAll').classList.toggle('active', mode === 'all');
            currentPage = 1;
            showingResults = false;
            showQuestions();
        }

        function showQuestions() {
            const content = document.getElementById('content');

            if (!currentVariant) {
                content.innerHTML = '<div class="message info">Выберите вариант для начала</div>';
                return;
            }

            const questions = questionsData[currentVariant];
            let html = '';

            if (viewMode === 'all') {
                for (let i = 0; i < questions.length; i++) {
                    html += createQuestionBlock(i, questions[i]);
                }
                html += `<button class="check-button" onclick="checkAllAnswers()">Проверить все ответы</button>`;
            } else {
                const questionIndex = currentPage - 1;
                if (questionIndex >= 0 && questionIndex < questions.length) {
                    html += createQuestionBlock(questionIndex, questions[questionIndex]);
                    if (!isExamActive) {
                        html += `<button class="check-button" onclick="checkAnswer(${questionIndex})">Проверить ответ</button>`;
                    }
                }
                html += `<div class="page-info">Вопрос ${currentPage} из 40</div>`;
                html += createPagination(questions.length);
            }

            content.innerHTML = html;

            restoreAnswers();
            if (isExamActive) {
                addAutoNextListener();
            }
            updateStats();
        }

        function addAutoNextListener() {
            const radios = document.querySelectorAll('input[type="radio"]');
            radios.forEach(radio => {
                radio.addEventListener('change', () => {
                    saveCurrentAnswers();
                    setTimeout(() => {
                        if (currentPage < 40) {
                            goToQuestion(currentPage + 1);
                        } else {
                            finishExam();
                        }
                    }, 500);
                });
            });
        }

        function createQuestionBlock(index, question) {
            const variantKey = `v${currentVariant}q${index}`;
            const savedAnswer = answers[currentVariant]?.[index];

            const answers_html = question.a.map((ans, i) => {
                const id = `ans_${currentVariant}_${index}_${i}`;
                const isCorrect = showingResults && i === question.c;
                const isSelected = savedAnswer === i;
                const isIncorrect = showingResults && isSelected && i !== question.c;

                let className = 'answer-option';
                if (showingResults && isCorrect) className += ' correct';
                if (showingResults && isIncorrect) className += ' incorrect';

                return `
                    <label class="${className}">
                        <input type="radio" name="q${index}" value="${i}" id="${id}"
                            ${isSelected ? 'checked' : ''}
                            ${showingResults ? 'disabled' : ''}>
                        <label for="${id}">${ans}</label>
                    </label>
                `;
            }).join('');

            return `
                <div class="question-block">
                    <div class="question-number">Вопрос ${index + 1}</div>
                    <div class="question-text">${question.q}</div>
                    <div class="answers">
                        ${answers_html}
                    </div>
                </div>
            `;
        }

        function createPagination(total) {
            let html = '<div class="pagination">';

            if (currentPage > 1) {
                html += `<button onclick="goToQuestion(1)">« Первая</button>`;
                html += `<button onclick="goToQuestion(${currentPage - 1})">‹ Предыдущая</button>`;
            }

            html += `<button class="active" disabled>${currentPage}</button>`;

            if (currentPage < total) {
                html += `<button onclick="goToQuestion(${currentPage + 1})">Следующая ›</button>`;
                html += `<button onclick="goToQuestion(${total})">Последняя »</button>`;
            }

            html += '</div>';
            return html;
        }

        function goToQuestion(num) {
            saveCurrentAnswers();
            document.getElementById('questionNumber').value = num;
            currentPage = num;
            showingResults = false;
            showQuestions();
        }

        function saveCurrentAnswers() {
            if (!currentVariant) return;
            if (!answers[currentVariant]) {
                answers[currentVariant] = {};
            }

            const questions = questionsData[currentVariant];
            for (let i = 0; i < questions.length; i++) {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                if (selected) {
                    answers[currentVariant][i] = parseInt(selected.value);
                }
            }
            saveAnswers();
        }

        function selectRandomVariant() {
            const variants = Object.keys(questionsData).map(Number);
            const randomVariant = variants[Math.floor(Math.random() * variants.length)];

            hiddenVariant = randomVariant;
            currentVariant = randomVariant;
            currentPage = 1;
            showingResults = false;
            isExamActive = true;
            timeRemaining = 3600;

            if (!answers[currentVariant]) {
                answers[currentVariant] = {};
            }

            document.getElementById('variant').style.display = 'none';
            document.querySelector('button[onclick="selectRandomVariant()"]').style.display = 'none';

            const variantInfo = document.createElement('div');
            variantInfo.id = 'randomVariantInfo';
            variantInfo.style.cssText = 'padding: 10px 15px; background: #fff3cd; border: 2px solid #ffc107; border-radius: 5px; color: #856404; font-weight: 600; display: flex; justify-content: space-between; align-items: center;';
            variantInfo.innerHTML = '🎲 Экзамен: <span id="timer" style="font-weight: bold; margin: 0 15px;">01:00:00</span> <button onclick="finishExam()" style="margin: 0 10px; padding: 5px 10px; background: #4CAF50; color: white; border: none; border-radius: 3px; cursor: pointer;">Завершить</button> <button onclick="cancelRandomVariant()" style="padding: 5px 10px; background: #ff6b6b; color: white; border: none; border-radius: 3px; cursor: pointer;">Отменить</button>';
            document.querySelector('.controls').appendChild(variantInfo);

            startTimer();
            updateStats();
            showQuestions();
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeRemaining--;
                updateTimerDisplay();
                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    finishExam();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const hours = Math.floor(timeRemaining / 3600);
            const minutes = Math.floor((timeRemaining % 3600) / 60);
            const seconds = timeRemaining % 60;
            const display = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            const timerEl = document.getElementById('timer');
            if (timerEl) timerEl.textContent = display;
        }

        function cancelRandomVariant() {
            if (timerInterval) clearInterval(timerInterval);
            isExamActive = false;
            hiddenVariant = null;
            currentVariant = null;
            currentPage = 1;
            showingResults = false;
            document.getElementById('questionNumber').value = 1;

            document.getElementById('variant').style.display = 'block';
            document.querySelector('button[onclick="selectRandomVariant()"]').style.display = 'block';
            const randomInfo = document.getElementById('randomVariantInfo');
            if (randomInfo) randomInfo.remove();

            updateStats();
            showQuestions();
        }

        function restoreAnswers() {
            if (!currentVariant || !answers[currentVariant]) return;

            for (let i = 0; i < questionsData[currentVariant].length; i++) {
                const savedAnswer = answers[currentVariant][i];
                if (savedAnswer !== undefined) {
                    const radio = document.querySelector(`input[name="q${i}"][value="${savedAnswer}"]`);
                    if (radio) {
                        radio.checked = true;
                    }
                }
            }
        }

        function checkAnswer(questionIndex) {
            saveCurrentAnswers();
            const questions = questionsData[currentVariant];
            const question = questions[questionIndex];
            const selected = document.querySelector(`input[name="q${questionIndex}"]:checked`);

            if (!selected) {
                alert('Выберите ответ!');
                return;
            }

            showingResults = true;
            showQuestions();

            const isCorrect = parseInt(selected.value) === question.c;
            const correctAnswer = question.a[question.c];

            let resultHtml = '';
            if (isCorrect) {
                resultHtml = `<div class="result-message correct">✓ Правильно! Ответ: ${correctAnswer}</div>`;
            } else {
                const yourAnswer = question.a[parseInt(selected.value)];
                resultHtml = `<div class="result-message incorrect">✗ Неправильно! Ваш ответ: ${yourAnswer}<br>Правильный ответ: ${correctAnswer}</div>`;
            }

            const questionBlock = document.querySelector('.question-block');
            if (questionBlock) {
                questionBlock.insertAdjacentHTML('afterend', resultHtml);
            }
        }

        function checkAllAnswers() {
            saveCurrentAnswers();
            showingResults = true;
            showQuestions();

            const questions = questionsData[currentVariant];
            let correct = 0;
            let total = 0;

            questions.forEach((q, i) => {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                if (selected) {
                    total++;
                    if (parseInt(selected.value) === q.c) {
                        correct++;
                    }
                }
            });

            const percentage = total > 0 ? Math.round((correct / total) * 100) : 0;
            let resultHtml = `<div class="result-message correct" style="margin-top: 30px; font-size: 1.2em;">
                Результат: ${correct} из ${total} (${percentage}%)
            </div>`;

            if (hiddenVariant) {
                const variantNames = {
                    1: 'Вариант 1',
                    2: 'Вариант 2',
                    3: 'Вариант 3',
                    4: 'Вариант 4',
                    5: 'Вариант 5',
                    6: 'Вариант 6',
                    7: 'Нұсқа №7 (Вариант 7)',
                    8: 'Нұсқа №8 (Вариант 8)',
                    9: 'Нұсқа №9 (Вариант 9)'
                };
                resultHtml += `<div class="result-message" style="margin-top: 15px; background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; font-size: 1.1em;">
                    🎲 Это был: <strong>${variantNames[hiddenVariant]}</strong>
                </div>`;
            }

            document.getElementById('content').insertAdjacentHTML('beforeend', resultHtml);
        }

        function updateStats() {
            if (!currentVariant) {
                document.getElementById('totalQuestions').textContent = '0';
                document.getElementById('answered').textContent = '0';
                document.getElementById('progress').textContent = '0%';
                return;
            }

            const questions = questionsData[currentVariant];
            const userAnswers = answers[currentVariant] || {};
            const answered = Object.keys(userAnswers).length;

            document.getElementById('totalQuestions').textContent = questions.length;
            document.getElementById('answered').textContent = answered;
            const progress = Math.round((answered / questions.length) * 100);
            document.getElementById('progress').textContent = progress + '%';
        }

        function finishExam() {
            if (timerInterval) clearInterval(timerInterval);
            isExamActive = false;

            saveCurrentAnswers();
            const questions = questionsData[currentVariant];
            let correct = 0;
            let html = '<div style="max-width: 900px; margin: 0 auto;"><h2 style="text-align: center; margin-bottom: 30px;">📊 Результаты экзамена</h2>';

            questions.forEach((q, i) => {
                const userAnswer = answers[currentVariant]?.[i];
                const isAnswered = userAnswer !== undefined;
                const isCorrect = isAnswered && userAnswer === q.c;
                if (isCorrect) correct++;

                const status = !isAnswered ? '❓' : isCorrect ? '✅' : '❌';
                const bgColor = !isAnswered ? '#e8e8e8' : isCorrect ? '#d4edda' : '#f8d7da';

                html += `<div style="background: ${bgColor}; padding: 15px; margin-bottom: 15px; border-radius: 5px; border-left: 4px solid ${isCorrect ? '#28a745' : isAnswered ? '#dc3545' : '#999'};">
                    <div style="font-weight: bold; margin-bottom: 8px;">${status} Вопрос ${i + 1}</div>
                    <div style="margin-bottom: 10px; color: #333;">${q.q}</div>
                    <div style="margin-bottom: 8px;"><strong>Вариант ответов:</strong></div>
                    <ul style="margin: 5px 0; padding-left: 20px;">`;

                q.a.forEach((ans, idx) => {
                    const isUserAnswer = isAnswered && userAnswer === idx;
                    const isCorrectAns = idx === q.c;
                    let style = '';
                    if (isUserAnswer && isCorrect) style = 'color: #28a745; font-weight: bold;';
                    else if (isUserAnswer && !isCorrect) style = 'color: #dc3545; font-weight: bold;';
                    else if (isCorrectAns && !isCorrect && isAnswered) style = 'color: #28a745; font-weight: bold;';

                    const mark = (isUserAnswer && isCorrect) ? ' ✓' :
                               (isUserAnswer && !isCorrect) ? ' ✗' :
                               (isCorrectAns && !isCorrect && isAnswered) ? ' ✓ (правильный)' : '';

                    html += `<li style="${style}">${ans}${mark}</li>`;
                });

                if (!isAnswered) {
                    html += `<li style="color: #999; font-style: italic;">Ответ не дан</li>`;
                }

                html += `</ul></div>`;
            });

            const percentage = Math.round((correct / questions.length) * 100);
            html += `<div style="background: #d1ecf1; padding: 20px; border-radius: 5px; text-align: center; font-size: 1.2em; margin-top: 30px; border: 2px solid #0c5460;">
                <strong style="color: #0c5460;">Итоговый результат: ${correct} из ${questions.length} (${percentage}%)</strong>
                <div style="margin-top: 15px;">🎲 Вариант: <strong>${hiddenVariant}</strong></div>
            </div>
            <button onclick="backFromExam()" style="margin-top: 20px; padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1em;">← Вернуться</button>
            </div>`;

            document.getElementById('content').innerHTML = html;

            const randomInfo = document.getElementById('randomVariantInfo');
            if (randomInfo) randomInfo.remove();
        }

        function backFromExam() {
            cancelRandomVariant();
        }

        loadAnswers();

        initLanguages().then(() => {
          const lang = document.getElementById('languageSelect').value;
          if (allLanguageData[lang] && allLanguageData[lang].variants) {
            const javaVariants = {};
            for (let variant in allLanguageData[lang].variants) {
              javaVariants[variant] = allLanguageData[lang].variants[variant];
            }
            questionsData = javaVariants;
          }
          showQuestions();
        });
    </script>
</body>
</html>
