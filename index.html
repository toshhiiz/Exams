<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java Экзамен - 360 вопросов</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/i18next/23.7.6/i18next.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>Экзамен</h1>
                <p id="pageSubtitle">360 вопросов - 9 вариантов по 40 вопросов</p>
            </div>
            <div class="language">
                <select id="languageSelect" onchange="changeLanguage()">
                    <option value="ru">Русский</option>
                    <option value="en">English</option>
                    <option value="kz">Казахский</option>
                </select>
                <a href="admin.html" title="Админка">🔧</a>
            </div>
        </div>
    


        <div class="controls">
            <div class="control-group">
                <label for="variant">Выбрать вариант:</label>
                <select id="variant">
                    <option> Выберите вариант </option>
                    <option value="1">Вариант 1</option>
                    <option value="2">Вариант 2</option>
                    <option value="3">Вариант 3</option>
                    <option value="4">Вариант 4</option>
                    <option value="5">Вариант 5</option>
                    <option value="6">Вариант 6</option>
                    <option value="7">Вариант 7</option>
                    <option value="8">Вариант 8</option>
                    <option value="9">Вариант 9</option>
                </select>
            </div>

            <div class="control-group">
                <label>&nbsp;</label>
                <button onclick="selectRandomVariant()" style="background: #28a745;">🎲 Случайный вариант</button>
            </div>

            <div class="control-group">
                <label for="questionNumber">Номер вопроса:</label>
                <div class="number-input-wrapper">
                    <button type="button" class="number-input-btn" onclick="decreaseQuestion()">−</button>
                    <input type="number" id="questionNumber" min="1" max="40" value="1">
                    <button type="button" class="number-input-btn" onclick="increaseQuestion()">+</button>
                </div>
            </div>

            <div class="control-group">
                <label>Режим просмотра:</label>
                <div class="view-options">
                    <button id="viewSingle" class="active" onclick="setViewMode('single')">По одному</button>
                    <button id="viewAll" onclick="setViewMode('all')">Все вопросы</button>
                </div>
            </div>
        </div>

        <div class="content" id="content">
            <div class="message info">Выберите вариант для начала</div>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="totalQuestions">0</div>
                <div class="stat-label">Всего вопросов</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="answered">0</div>
                <div class="stat-label">Ответлено</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="progress">0%</div>
                <div class="stat-label">Прогресс</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
